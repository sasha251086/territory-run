<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#5B8A72" />
    <meta name="description" content="Territory Run — бегай и захватывай территории" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=Fraunces:opsz,wght@9..144,600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />
    <title>Territory Run</title>
    <style id="paper-atlas-bootstrap">
      html.paper-atlas {
        --bg: #f7f4ee;
        --surface: #ffffff;
        --surface-2: #f0ebe3;
        --border: #e5ddd2;
        --border-strong: #2c2825;
        --text: #2c2825;
        --text-secondary: #5c564e;
        --text-muted: #8a8378;
        --btn-primary: #5b8a72;
        --cell-own: #5b8a72;
        --cell-own-stroke: #466b58;
        --radius: 12px;
        --radius-sm: 8px;
        --font-display: 'Fraunces', Georgia, serif;
        --font-body: 'DM Sans', system-ui, sans-serif;
        --font-data: 'JetBrains Mono', monospace;
      }
      html.paper-atlas,
      html.paper-atlas body {
        background-color: #f7f4ee;
        color: #2c2825;
      }
    </style>
    <script>
      document.documentElement.classList.add('paper-atlas');
    </script>
    <script>
      (function () {
        var params = new URLSearchParams(location.search);
        var isNativeShell =
          params.has('native') ||
          location.hostname === 'localhost' ||
          location.protocol === 'capacitor:';
        if (!isNativeShell) return;
        try {
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function (regs) {
              regs.forEach(function (r) { r.unregister(); });
            });
          }
          if ('caches' in window) {
            caches.keys().then(function (keys) {
              keys.forEach(function (k) { caches.delete(k); });
            });
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
