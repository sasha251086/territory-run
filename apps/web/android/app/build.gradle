apply plugin: 'com.android.application'
apply plugin: 'org.jetbrains.kotlin.android'
apply plugin: 'kotlin-parcelize'

def samsungLibsDir = file('libs')
def samsungSdkAars = fileTree(dir: samsungLibsDir, include: ['*.aar'])
def samsungSdkZipCandidates = fileTree(dir: samsungLibsDir, include: ['*.zip']).files
def samsungSdkZips = samsungSdkZipCandidates.findAll { zip ->
    def name = zip.name.toLowerCase()
    name.contains('samsung') || name.contains('health')
}
if (samsungSdkZips.isEmpty()) {
    samsungSdkZips = samsungSdkZipCandidates
}

// Samsung distributes SDK as ZIP (Libs/samsung-health-data-api-*.aar inside).
def hasSamsungHealthSdk = !samsungSdkAars.isEmpty() || !samsungSdkZips.isEmpty()

tasks.register('extractSamsungHealthSdk') {
    onlyIf { samsungSdkAars.isEmpty() && !samsungSdkZips.isEmpty() }
    doLast {
        def zipFile = samsungSdkZips.first()
        copy {
            from(zipTree(zipFile))
            into(samsungLibsDir)
            include '**/*.aar'
            eachFile { details ->
                details.path = details.name
            }
            includeEmptyDirs = false
        }
        logger.lifecycle("Extracted Samsung Health Data SDK AAR from ${zipFile.name}")
    }
}

tasks.named('preBuild').configure {
    dependsOn tasks.named('extractSamsungHealthSdk')
}

android {
    namespace = "com.territoryrun.app"
    compileSdk = rootProject.ext.compileSdkVersion
    buildFeatures {
        buildConfig true
    }
    defaultConfig {
        applicationId "com.territoryrun.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        buildConfigField "boolean", "HAS_SAMSUNG_HEALTH_SDK", "${hasSamsungHealthSdk}"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }
    kotlinOptions {
        jvmTarget = '21'
    }
    sourceSets {
        main {
            if (hasSamsungHealthSdk) {
                java.srcDir 'src/samsungHealth/java'
            }
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar', '*.aar'])
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
    implementation 'androidx.health.connect:connect-client:1.2.0-alpha01'
    implementation 'androidx.core:core-ktx:1.13.1'
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'
    if (hasSamsungHealthSdk) {
        implementation 'com.google.code.gson:gson:2.11.0'
    }
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
