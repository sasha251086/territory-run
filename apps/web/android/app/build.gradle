apply plugin: 'com.android.application'
apply plugin: 'org.jetbrains.kotlin.android'
apply plugin: 'kotlin-parcelize'

def samsungLibsDir = file('libs')
def samsungSdkAars = fileTree(dir: samsungLibsDir, include: ['*.aar'])
def samsungSdkZipCandidates = fileTree(dir: samsungLibsDir, include: ['*.zip']).files
def samsungSdkZips = samsungSdkZipCandidates.findAll { zip ->
    def name = zip.name.toLowerCase()
    name.contains('samsung') || name.contains('health')
}
if (samsungSdkZips.isEmpty()) {
    samsungSdkZips = samsungSdkZipCandidates
}

def hasSamsungHealthSdk = !samsungSdkAars.isEmpty() || !samsungSdkZips.isEmpty()
def liveWebUrl = 'https://territory-run-cjoj.onrender.com/'

tasks.register('prepareWebAssets') {
    doLast {
        def publicDir = file('src/main/assets/public')
        if (!publicDir.exists()) {
            throw new GradleException(
                'Missing android/app/src/main/assets/public. From apps/web run: pnpm mobile:sync'
            )
        }

        def cfgFile = new File(publicDir, 'capacitor.config.json')
        def remoteUrl = ''
        if (cfgFile.exists()) {
            def json = new groovy.json.JsonSlurper().parse(cfgFile)
            remoteUrl = json.server?.url?.toString() ?: ''
        }

        publicDir.eachFile { f ->
            def name = f.name
            if (name == 'sw.js' || name.startsWith('workbox-')) {
                delete f
                logger.lifecycle("Removed PWA cache file: ${name}")
            }
        }

        def bundleDir = new File(publicDir, 'assets')
        if (bundleDir.exists()) {
            delete bundleDir
            logger.lifecycle('Removed bundled web UI (APK uses live site only)')
        }
        publicDir.eachFile { f ->
            def name = f.name
            if (name.endsWith('.js') || name.endsWith('.css')) {
                delete f
                logger.lifecycle("Removed bundled web file: ${name}")
            }
        }

        if (!cfgFile.exists()) {
            throw new GradleException(
                'Missing capacitor.config.json. From apps/web run: pnpm mobile:sync'
            )
        }
        if (!remoteUrl.startsWith(liveWebUrl)) {
            throw new GradleException(
                "server.url must start with ${liveWebUrl}, got: ${remoteUrl}. Run: pnpm mobile:sync"
            )
        }
        logger.lifecycle("Android UI: live site only (${liveWebUrl})")

        if (!hasSamsungHealthSdk) {
            logger.lifecycle(
                'WARNING: Samsung Health Data SDK missing in android/app/libs/ — ' +
                    'APK will use SamsungHealthPluginStub (no Samsung Health import). ' +
                    'Restore libs/ from git or add SDK ZIP. See libs/README.md'
            )
        } else {
            logger.lifecycle('Samsung Health Data SDK: enabled')
        }
    }
}

tasks.register('extractSamsungHealthSdk') {
    onlyIf { samsungSdkAars.isEmpty() && !samsungSdkZips.isEmpty() }
    doLast {
        def zipFile = samsungSdkZips.first()
        copy {
            from(zipTree(zipFile))
            into(samsungLibsDir)
            include '**/*.aar'
            eachFile { details ->
                details.path = details.name
            }
            includeEmptyDirs = false
        }
        logger.lifecycle("Extracted Samsung Health Data SDK AAR from ${zipFile.name}")
    }
}

tasks.named('preBuild').configure {
    dependsOn tasks.named('extractSamsungHealthSdk')
    dependsOn tasks.named('prepareWebAssets')
}

android {
    namespace = "com.territoryrun.app"
    compileSdk = rootProject.ext.compileSdkVersion

    buildFeatures {
        buildConfig true
    }

    defaultConfig {
        applicationId "com.territoryrun.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 22
        versionName "2.1.3"
        buildConfigField "String", "LIVE_WEB_URL", "\"${liveWebUrl}\""
        buildConfigField "boolean", "HAS_SAMSUNG_HEALTH_SDK", "${hasSamsungHealthSdk}"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }

    kotlinOptions {
        jvmTarget = '21'
    }

    sourceSets {
        main {
            if (hasSamsungHealthSdk) {
                java.srcDir 'src/samsungHealth/java'
            }
        }
    }
}

repositories {
    flatDir {
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar', '*.aar'])
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
    implementation 'androidx.health.connect:connect-client:1.2.0-alpha01'
    implementation 'androidx.core:core-ktx:1.13.1'
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'
    if (hasSamsungHealthSdk) {
        implementation 'com.google.code.gson:gson:2.11.0'
    }
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.exists()) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch (Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
