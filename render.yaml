# Render Blueprint — подключите в Dashboard: New > Blueprint > подключить этот репозиторий
# Или создайте сервис вручную по тем же параметрам ниже.

services:
  - type: web
    name: territory-run-api
    runtime: docker
    rootDir: apps/api
    dockerfilePath: ./Dockerfile
    dockerCommand: ''
    # Пустая строка = без Pre-Deploy. Миграции выполняются в Dockerfile CMD.
    preDeployCommand: ''
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      # DATABASE_URL, REDIS_HOST, REDIS_PORT — задайте вручную в Dashboard
      # (привязка к Render Postgres / Redis).
      # Опционально: SENTRY_DSN, STRAVA_CLIENT_ID, STRAVA_CLIENT_SECRET, STRAVA_REDIRECT_URI

  - type: web
    name: territory-run-web
    runtime: static
    rootDir: .
    buildCommand: pnpm install && pnpm --filter web build
    staticPublishPath: apps/web/dist
    envVars:
      # URL вашего API-сервиса на Render (без слэша в конце)
      - key: VITE_API_URL
        sync: false
