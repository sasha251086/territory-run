<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Territory Run</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { margin:0; background:#f0f2f5; display:flex; flex-direction:column; align-items:center; padding:20px; }
        .container { max-width:1200px; width:100%; background:white; border-radius:16px; padding:20px; box-shadow:0 4px 20px rgba(0,0,0,0.1); }
        h1 { margin:0 0 20px; color:#1a202c; }
        .row { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:15px; }
        .row input, .row button { padding:10px 16px; border-radius:8px; border:1px solid #e2e8f0; font-size:14px; }
        .row input { flex:1; min-width:150px; }
        .row button { background:#3182ce; color:white; border:none; cursor:pointer; font-weight:500; }
        .row button:hover { background:#2b6cb0; }
        .card { background:#f7fafc; border-radius:12px; padding:16px; margin-bottom:16px; }
        #map { height:400px; border-radius:12px; margin-bottom:16px; }
        .log-area { background:#1e293b; color:#e2e8f0; border-radius:8px; padding:12px; font-family:monospace; font-size:13px; max-height:200px; overflow-y:auto; white-space:pre-wrap; margin-top:10px; }
        .token-status { background:#edf2f7; padding:10px; border-radius:8px; margin-bottom:16px; word-break:break-all; font-size:14px; }
        .badge { display:inline-block; padding:2px 10px; border-radius:20px; font-size:12px; font-weight:500; }
        .badge.success { background:#48bb78; color:white; }
        .badge.error { background:#fc8181; color:white; }
        .flex { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    </style>
</head>
<body>
<div class="container">
    <h1>🏃 Territory Run</h1>

    <div class="token-status" id="tokenStatus">
        🔑 Статус: <span id="tokenDisplay">Не авторизован</span>
        <button onclick="logout()" style="margin-left:12px; padding:4px 12px; border-radius:6px; border:1px solid #e53e3e; background:transparent; color:#e53e3e; cursor:pointer;">Выйти</button>
    </div>

    <div class="card">
        <h3>👤 Авторизация</h3>
        <div class="row">
            <input id="email" placeholder="Email" value="test@render.com" />
            <input id="nickname" placeholder="Никнейм (для регистрации)" value="runner_render" />
            <input id="password" placeholder="Пароль" type="password" value="123456" />
        </div>
        <div class="flex">
            <button id="registerBtn">📝 Зарегистрироваться</button>
            <button id="loginBtn" style="background:#48bb78;">🔑 Войти</button>
        </div>
    </div>

    <div class="card">
        <h3>🏃 Тренировка</h3>
        <button id="activityBtn" style="background:#805ad5;">📤 Загрузить тестовый трек</button>
        <span style="margin-left:12px; font-size:14px; color:#4a5568;">(3 точки в центре Риги)</span>
    </div>

    <div class="card">
        <h3>🗺️ Карта</h3>
        <div id="map"></div>
        <button id="refreshMapBtn" style="background:#38a169;">🔄 Обновить карту</button>
    </div>

    <div class="card">
        <h3>📰 Лента событий</h3>
        <button id="feedBtn" style="background:#ed8936;">📰 Показать ленту</button>
        <div id="feedResult" style="margin-top:10px;"></div>
    </div>

    <div class="card">
        <h3>🏆 Рейтинг по клеткам</h3>
        <button id="leaderboardBtn" style="background:#d69e2e;">🏆 Показать топ</button>
        <div id="leaderboardResult" style="margin-top:10px;"></div>
    </div>

    <div class="card">
        <h3>📋 Логи</h3>
        <div class="log-area" id="logArea">⏳ Ожидание действий...</div>
    </div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // ===== НАСТРОЙКА =====
    const API_URL = 'https://territory-run-api-erbs.onrender.com';

    // ===== ЛОГИ =====
    const logArea = document.getElementById('logArea');
    function addLog(message, type = 'info') {
        const time = new Date().toLocaleTimeString();
        const entry = document.createElement('div');
        entry.innerHTML = `<span style="color:#94a3b8;">[${time}]</span> ${message}`;
        logArea.appendChild(entry);
        logArea.scrollTop = logArea.scrollHeight;
    }
    function clearLogs() { logArea.innerHTML = ''; addLog('Логи очищены', 'info'); }

    // ===== ТОКЕН =====
    function getToken() { return localStorage.getItem('accessToken'); }
    function setToken(token) { localStorage.setItem('accessToken', token); updateTokenDisplay(); }
    function clearToken() { localStorage.removeItem('accessToken'); updateTokenDisplay(); addLog('🔑 Токен удалён', 'info'); }
    function updateTokenDisplay() {
        const token = getToken();
        const display = document.getElementById('tokenDisplay');
        if (token) {
            display.textContent = '✅ Авторизован';
            display.style.color = '#38a169';
        } else {
            display.textContent = '❌ Не авторизован';
            display.style.color = '#e53e3e';
        }
    }
    updateTokenDisplay();

    function logout() { clearToken(); window.location.reload(); }

    // ===== HTTP HELPER =====
    async function apiRequest(endpoint, method, body, requiresToken = false) {
        const headers = { 'Content-Type': 'application/json' };
        if (requiresToken) {
            const token = getToken();
            if (!token) throw new Error('Нет токена. Сначала войдите.');
            headers['Authorization'] = `Bearer ${token}`;
        }
        const options = { method, headers, body: body ? JSON.stringify(body) : undefined };
        addLog(`➡️ ${method} ${endpoint}`, 'info');
        const response = await fetch(`${API_URL}${endpoint}`, options);
        const data = await response.json().catch(() => ({ error: 'Не удалось разобрать ответ' }));
        if (!response.ok) {
            const msg = data.message || data.error || `Ошибка ${response.status}`;
            addLog(`❌ ${method} ${endpoint} → ${response.status} ${msg}`, 'error');
            throw new Error(msg);
        }
        addLog(`✅ ${method} ${endpoint} → ${response.status}`, 'success');
        return data;
    }

    // ===== КАРТА =====
    let map = null;
    function initMap() {
        if (map) { map.remove(); }
        map = L.map('map').setView([56.95, 24.10], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);
        addLog('🗺️ Карта загружена', 'info');
    }
    initMap();

    // ===== ОТОБРАЖЕНИЕ КЛЕТОК =====
    async function refreshMap() {
        try {
            const data = await apiRequest('/map/cells?limit=200', 'GET', null, true);
            const cells = data.cells || [];
            if (cells.length === 0) { addLog('ℹ️ Клеток пока нет', 'info'); return; }
            // Удаляем старые маркеры (кроме слоя тайлов)
            map.eachLayer((layer) => {
                if (layer instanceof L.Marker || layer instanceof L.Polygon) {
                    map.removeLayer(layer);
                }
            });
            let count = 0;
            cells.forEach(cell => {
                // Преобразуем h3Index в координаты (приблизительно)
                // Для простоты используем центр клетки, но у нас нет точных координат.
                // Вместо этого, для демонстрации, мы можем показать маркер по координатам из трека.
                // Так как у нас нет координат центра, мы используем случайное смещение.
                // В идеале надо хранить центр в базе, но для MVP покажем маркеры.
                // Поскольку у нас есть только h3Index, мы не можем точно отобразить.
                // Поэтому для красоты покажем маркеры на основе первых трёх точек.
                // Это временное решение.
                // Вместо этого мы можем показать полигоны, но это сложнее.
                // Покажем просто маркеры с текстом.
                // Мы используем приблизительные координаты из трека.
                // Так как мы не храним центр, я добавлю небольшой оффсет.
                const lat = 56.95 + (count % 3) * 0.01;
                const lng = 24.10 + Math.floor(count / 3) * 0.01;
                const marker = L.marker([lat, lng]).addTo(map);
                const owner = cell.ownerNickname || 'нейтральная';
                marker.bindPopup(`Клетка ${cell.h3Index}<br>Владелец: ${owner}<br>Влияние: ${cell.influence}`);
                count++;
            });
            addLog(`🗺️ Отображено ${count} клеток`, 'success');
        } catch (e) {
            addLog(`❌ Ошибка загрузки карты: ${e.message}`, 'error');
        }
    }

    // ===== КНОПКИ =====

    // Регистрация
    document.getElementById('registerBtn').addEventListener('click', async () => {
        const email = document.getElementById('email').value;
        const nickname = document.getElementById('nickname').value;
        const password = document.getElementById('password').value;
        try {
            const data = await apiRequest('/auth/register', 'POST', { email, nickname, password });
            setToken(data.accessToken);
            addLog(`👤 Зарегистрирован ${nickname}`, 'success');
        } catch (e) { addLog(`❌ ${e.message}`, 'error'); }
    });

    // Логин
    document.getElementById('loginBtn').addEventListener('click', async () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        try {
            const data = await apiRequest('/auth/login', 'POST', { email, password });
            setToken(data.accessToken);
            addLog(`🔑 Вход выполнен для ${email}`, 'success');
        } catch (e) { addLog(`❌ ${e.message}`, 'error'); }
    });

    // Активность
    document.getElementById('activityBtn').addEventListener('click', async () => {
        const now = new Date();
        const startedAt = now.toISOString();
        const finishedAt = new Date(now.getTime() + 1800*1000).toISOString();
        const body = {
            source: 'internal',
            distanceMeters: 5000,
            durationSeconds: 1800,
            avgPace: 360,
            startedAt, finishedAt,
            track: [
                { lat: 56.95, lng: 24.10 },
                { lat: 56.96, lng: 24.11 },
                { lat: 56.97, lng: 24.12 }
            ]
        };
        try {
            const data = await apiRequest('/activities', 'POST', body, true);
            addLog(`🏃 Активность создана (ID: ${data.data?.activityId})`, 'success');
            addLog('⏳ Обработка займёт 5–10 сек. Нажмите "Обновить карту".', 'info');
        } catch (e) { addLog(`❌ ${e.message}`, 'error'); }
    });

    // Карта
    document.getElementById('refreshMapBtn').addEventListener('click', refreshMap);

    // Лента
    document.getElementById('feedBtn').addEventListener('click', async () => {
        try {
            const data = await apiRequest('/feed?limit=10', 'GET', null, true);
            const items = data.items || [];
            const html = items.map(e => `<div>${e.type} от ${e.user?.nickname || '?'} в ${new Date(e.createdAt).toLocaleTimeString()}</div>`).join('');
            document.getElementById('feedResult').innerHTML = html || 'Событий пока нет';
            addLog(`📰 Получено ${items.length} событий`, 'success');
        } catch (e) { addLog(`❌ ${e.message}`, 'error'); }
    });

    // Рейтинг
    document.getElementById('leaderboardBtn').addEventListener('click', async () => {
        try {
            const data = await apiRequest('/leaderboard/cells?limit=10', 'GET', null, true);
            const html = data.map((item, i) => `<div>${i+1}. ${item.nickname} — ${item.value} клеток</div>`).join('');
            document.getElementById('leaderboardResult').innerHTML = html || 'Нет данных';
            addLog(`🏆 Топ получен (${data.length} записей)`, 'success');
        } catch (e) { addLog(`❌ ${e.message}`, 'error'); }
    });

    addLog('🚀 Интерфейс загружен. Авторизуйтесь и нажимайте кнопки.', 'info');
    addLog(`🌐 API: ${API_URL}`, 'info');
    if (getToken()) addLog('🔑 Токен уже есть. Нажмите "Обновить карту".', 'success');
    else addLog('⚠️ Токен отсутствует. Выполните вход или регистрацию.', 'warning');
</script>
</body>
</html>
